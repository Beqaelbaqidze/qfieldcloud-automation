name: Process QFieldCloud GeoPackage

on:
  # ── Automatic trigger: every 30 minutes ──────────────────────────────────
  schedule:
    - cron: "*/30 * * * *"

  # ── Manual trigger from GitHub UI (Actions tab → Run workflow) ────────────
  workflow_dispatch:
    inputs:
      polygon_layer:
        description: "Polygon layer name in the GeoPackage"
        required: false
        default: "polygons"
      lines_layer:
        description: "Output lines layer name"
        required: false
        default: "polygon_boundaries"

jobs:
  process-geopackage:
    name: Convert polygons → lines and sync to QFieldCloud
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # ── Required secrets (set in GitHub → Settings → Secrets → Actions) ──
      QFIELDCLOUD_TOKEN:      ${{ secrets.QFIELDCLOUD_TOKEN }}
      QFIELDCLOUD_PROJECT_ID: ${{ secrets.QFIELDCLOUD_PROJECT_ID }}

      # ── Optional overrides (hard-coded here; override via repository vars) ─
      QFIELDCLOUD_URL:    ${{ vars.QFIELDCLOUD_URL || 'https://app.qfield.cloud' }}
      GPKG_FILENAME:      ${{ vars.GPKG_FILENAME   || 'project.gpkg' }}

      # Manual-run inputs fall back to repository-level variables or defaults
      POLYGON_LAYER_NAME: ${{ github.event.inputs.polygon_layer || vars.POLYGON_LAYER_NAME || 'polygons' }}
      LINES_LAYER_NAME:   ${{ github.event.inputs.lines_layer   || vars.LINES_LAYER_NAME   || 'polygon_boundaries' }}

    steps:
      # ── 1. Checkout repository ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      # ── 3. Install system libraries needed by GDAL / Fiona ───────────────
      - name: Install GDAL system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev \
            gdal-bin \
            libsqlite3-dev

      # ── 4. Install Python dependencies ───────────────────────────────────
      - name: Install Python dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      # ── 5. Validate secrets are present before running ───────────────────
      - name: Validate required secrets
        run: |
          if [ -z "$QFIELDCLOUD_TOKEN" ]; then
            echo "::error::Secret QFIELDCLOUD_TOKEN is not set."
            exit 1
          fi
          if [ -z "$QFIELDCLOUD_PROJECT_ID" ]; then
            echo "::error::Secret QFIELDCLOUD_PROJECT_ID is not set."
            exit 1
          fi
          echo "Secrets validated."

      # ── 6. Run the processing script ─────────────────────────────────────
      - name: Process GeoPackage
        run: python process_geopackage.py

      # ── 7. Upload local GeoPackage as a workflow artifact (for debugging) ─
      - name: Upload processed GeoPackage as artifact
        if: always()   # run even if the script fails, to aid debugging
        uses: actions/upload-artifact@v4
        with:
          name: processed-geopackage-${{ github.run_id }}
          path: project.gpkg
          retention-days: 7
          if-no-files-found: warn
